name: Lint Code

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Python Linter
        run: |
          find ./server -name "*.py" \
            -not -path "*/djangoenv/*" \
            -not -path "*/migrations/*" \
            -exec flake8 \
            --ignore=E501,E302,E305,E231,E225,E226,E128,E131,E117,E121,E712,E722,E275,E251,E261,E303,E402,W191,W293,W391,F401,F811,F841,E101 \
            {} +
          echo "Python lint successful"

  lint_javascript:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JSHint
        run: |
          npm install -g jshint

      - name: Create JSHint Config
        run: |
          cat > .jshintrc << EOF
          {
            "esversion": 8,
            "node": true,
            "asi": true,
            "sub": true
          }
          EOF

      - name: Run JavaScript Linter
        run: |
          find ./server/database -name "*.js" \
            -exec jshint {} +
          echo "JavaScript lint successful"
